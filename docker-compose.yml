version: "3.8"

services:
  # ==========================================
  # База данных (PostgreSQL + pgvector)
  # ==========================================
  db:
    image: pgvector/pgvector:pg15
    container_name: kg-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: kg_db
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./scripts/init-db.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - kg-network

  # ==========================================
  # Кэш и Брокер сообщений (Redis)
  # ==========================================
  redis:
    image: redis:7-alpine
    container_name: kg-redis
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - kg-network

  # ==========================================
  # Основное приложение (Backend)
  # ==========================================
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: kg-backend
    ports:
      - "8000:8000"
    environment:
      - ENVIRONMENT=local
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/kg_db
      - REDIS_URL=redis://redis:6379/0
      - STRAPI_URL=http://strapi:1337
      - STRAPI_API_TOKEN=${STRAPI_API_TOKEN:-mytoken}
      - LOG_LEVEL=DEBUG
    volumes:
      - ./app:/app/app
      - ./logs:/app/logs
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      strapi:
        condition: service_healthy
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload
    networks:
      - kg-network

  # ==========================================
  # CMS (Strapi)
  # ==========================================
  strapi:
    image: strapi/strapi:4.25.6
    container_name: kg-strapi
    ports:
      - "1337:1337"
    environment:
      - APP_KEYS=${APP_KEYS:-toBeGenerated1,toBeGenerated2}
      - API_TOKEN_SALT=${API_TOKEN_SALT:-mysalt}
      - ADMIN_JWT_SECRET=${ADMIN_JWT_SECRET:-mysecret}
      - JWT_SECRET=${JWT_SECRET:-myjwtsecret}
      - DATABASE_CLIENT=postgres
      - DATABASE_HOST=db
      - DATABASE_PORT=5432
      - DATABASE_NAME=kg_strapi
      - DATABASE_USERNAME=postgres
      - DATABASE_PASSWORD=postgres
    volumes:
      - strapi-config:/opt/app/config
      - strapi-src:/opt/app/src
      - strapi-plugins:/opt/app/plugins
      - strapi-content:/opt/app/public/uploads
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:1337/_health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
    networks:
      - kg-network

  # ==========================================
  # Воркер фоновых задач
  # ==========================================
  worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: kg-worker
    environment:
      - ENVIRONMENT=local
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/kg_db
      - REDIS_URL=redis://redis:6379/0
      - STRAPI_URL=http://strapi:1337
    depends_on:
      - backend
      - redis
      - db
    command: python -m celery -A app.core.celery_app worker --loglevel=info
    networks:
      - kg-network
    profiles:
      - workers

networks:
  kg-network:
    driver: bridge

volumes:
  pgdata:
  redis-data:
  strapi-config:
  strapi-src:
  strapi-plugins:
  strapi-content:
