version: "3.8"

services:
  db:
    image: pgvector/pgvector:pg15
    container_name: engels-db
    environment:
      POSTGRES_USER: engels
      POSTGRES_PASSWORD: engels_secure_password_change_me
      POSTGRES_DB: engels
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U engels"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: engels-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  strapi:
    build:
      context: ./backend/strapi
      dockerfile: Dockerfile
    container_name: engels-strapi
    environment:
      DATABASE_CLIENT: postgres
      DATABASE_HOST: db
      DATABASE_PORT: 5432
      DATABASE_NAME: engels
      DATABASE_USERNAME: engels
      DATABASE_PASSWORD: engels_secure_password_change_me
      JWT_SECRET: strapi_jwt_secret_change_me
      API_TOKEN_SALT: strapi_api_token_salt_change_me
      ADMIN_JWT_SECRET: strapi_admin_jwt_secret_change_me
      NODE_ENV: development
    volumes:
      - strapi_config:/opt/app/config
      - strapi_content:/opt/app/content
      - strapi_extensions:/opt/app/extensions
      - strapi_uploads:/opt/app/public/uploads
    ports:
      - "1337:1337"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  ollama:
    image: ollama/ollama:latest
    container_name: engels-ollama
    volumes:
      - ollama_data:/root/.ollama
    ports:
      - "11434:11434"
    environment:
      OLLAMA_NUM_PARALLEL: "2"
      OLLAMA_KEEP_ALIVE: "5m"
    deploy:
      resources:
        limits:
          memory: 8G

  celery-worker:
    build:
      context: ./backend
      dockerfile: Dockerfile.worker
    container_name: engels-celery-worker
    environment:
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
      DATABASE_URL: postgresql://engels:engels_secure_password_change_me@db:5432/engels
      OLLAMA_HOST: http://ollama:11434
      LOG_LEVEL: INFO
    volumes:
      - ./backend:/app
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      ollama:
        condition: service_started

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: engels-frontend
    environment:
      VITE_API_URL: http://localhost:1337
      NODE_ENV: development
    ports:
      - "3000:80"
    depends_on:
      strapi:
        condition: service_started

volumes:
  postgres_data:
  strapi_config:
  strapi_content:
  strapi_extensions:
  strapi_uploads:
  ollama_data:

networks:
  default:
    name: engels-network
