apiVersion: apps/v1
kind: Deployment
metadata:
  name: kg-backend
  namespace: knowledge-graph
  labels:
    app: kg-backend
    version: v1
spec:
  replicas: 3
  selector:
    matchLabels:
      app: kg-backend
  template:
    metadata:
      labels:
        app: kg-backend
        version: v1
    spec:
      serviceAccountName: kg-service-account
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      containers:
        - name: backend
          image: your-registry/knowledge-graph:latest
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 8000
              protocol: TCP
          envFrom:
            - configMapRef:
                name: kg-config
            - secretRef:
                name: kg-secrets
          env:
            - name: DATABASE_URL
              value: "postgresql://$(DATABASE_USER):$(DATABASE_PASSWORD)@kg-db:5432/$(DATABASE_NAME)"
            - name: REDIS_URL
              value: "redis://kg-redis:6379/0"
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          volumeMounts:
            - name: logs
              mountPath: /app/logs
      volumes:
        - name: logs
          emptyDir: {}
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchExpressions:
                    - key: app
                      operator: In
                      values:
                        - kg-backend
                topologyKey: kubernetes.io/hostname
